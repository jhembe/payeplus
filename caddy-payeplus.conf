# ─── PAYE+ — Tanzania Tax Intelligence ────────────────────────────────────
# Append this block to /opt/infra/Caddyfile
# Replace paye.mahembega.com with your actual domain or subdomain.

paye.mahembega.com {
    reverse_proxy payeplus:3000 {
        # Pass real client IP to Next.js
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}

        # Health check-aware load balancing
        health_uri /
        health_interval 30s
        health_timeout 10s
    }

    # Cache static Next.js assets aggressively (they have content-hash filenames)
    @static_assets path /_next/static/*
    header @static_assets Cache-Control "public, max-age=31536000, immutable"

    # Cache the tax schema for 24 hours
    @schema_asset path /tax_schema.json
    header @schema_asset Cache-Control "public, max-age=86400, stale-while-revalidate=3600"

    # Security headers
    header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "SAMEORIGIN"
        Referrer-Policy "strict-origin-when-cross-origin"
        Permissions-Policy "camera=(), microphone=(), geolocation=()"
        -Server
    }

    # Gzip / zstd compression
    encode zstd gzip

    # TLS — Caddy handles cert auto-provisioning via Let's Encrypt
    tls {
        protocols tls1.2 tls1.3
    }

    log {
        output file /var/log/caddy/payeplus_access.log {
            roll_size 10mb
            roll_keep 7
        }
        format json
    }
}
